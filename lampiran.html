<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rekonsiliasi</title>
		<style></style>
		<link href="./src/output.css" rel="stylesheet" />
	</head>
	<body class="m-2 element">
		<h1 class="font-black font-popins text-2xl mb-10">Lampiran BA</h1>

		<!-- pilihan untuk 1 bulan saja -->
		 <div class="mb-2 px-1 flex flex-wrap gap-3 items-center">
			<input type="checkbox" id="checkbox_bulan" class="cursor-pointer">
			<label for="checkbox_bulan" class="font-semibold text-sm">1 Bulan Saja</label>
		 </div>

		<!-- bulan dan tahun awal -->
		<div class="border-2 rounded-xl border-black p-2 mb-5">
			<p class="font-semibold">Bulan Awal</p>
			<div class="">
				<label for="my-selection">Bulan:</label>
				<select id="bulan_awal_select" name="myOption">
					<option value="04" disabled selected>Pilih Bulan</option>
				</select>
			</div>

			<div class="">
				<label for="my-selection">Tahun:</label>
				<select id="tahun_awal_select" name="myOption">
					<option value="2024" disabled selected>2024</option>
				</select>
			</div>
		</div>

		<!-- bulan dan tahun akhir -->
		<div class="border-2 rounded-xl border-black p-2" id="container_tanggal_akhir">
			<p class="font-semibold">Bulan Akhir</p>
			<div class="">
				<label for="my-selection">Bulan:</label>
				<select id="bulan_akhir_select" name="myOption">
					<option value="06" disabled selected>Pilih Bulan</option>
				</select>
			</div>

			<div class="">
				<label for="my-selection">Tahun:</label>
				<select id="tahun_akhir_select" name="myOption">
					<option value="2025" selected>2025</option>
				</select>
			</div>
		</div>

		<div class="mt-2">
			<button
				id="konfirmasi_button"
				class="text-white font-semibold py-2 px-3 rounded-full bg-green-700 hover:bg-green-600 cursor-pointer"
			>
				Konfirmasi
			</button>
		</div>

		<div class="p-3 bg-amber-200 mt-3 border-2 border-black	 rounded-lg">
			<h2 class="font-bold mb-2">INFO IURAN</h2>
			<p class="font-medium">Rentang : <span class="rentang_dipilih"></span></p>
			<p class="font-medium">Bulan   : <span class="bulan_dipilih"></span></p>
			<p class="font-medium">Iuran   : <span class="iuran_dipilih"></span></p>
		</div>

				>Home</a
			>
		</div> -->

		
	</body>
</html>
